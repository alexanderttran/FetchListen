<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DownloadYes — YouTube Downloader</title>
  <meta name="description" content="A sleek, modern YouTube downloader. Paste a link, pick a format, and download." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated grain overlay -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- Floating orbs background -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-wrapper">
    <!-- Header -->
    <header class="site-header" id="site-header">
      <div class="logo-group">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="24" height="24" rx="6" stroke="white" stroke-width="2"/>
            <polygon points="11,8 21,14 11,20" fill="white"/>
          </svg>
        </div>
        <span class="logo-text">Download<span class="logo-accent">Yes</span></span>
      </div>
      <nav class="header-nav">
        <span class="nav-pill active" id="nav-home">Home</span>
        <a href="https://github.com" target="_blank" class="nav-pill" id="nav-github">GitHub</a>
      </nav>
    </header>

    <!-- Hero -->
    <main class="main-content">
      <section class="hero" id="hero-section">
        <h1 class="hero-title">
          Download <span class="hero-highlight">anything</span><br/>from YouTube.
        </h1>
        <p class="hero-subtitle">Paste a link. Pick a format. Done.</p>

        <!-- URL Input Area -->
        <div class="input-area" id="input-area">
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <input
              type="url"
              id="url-input"
              class="url-input"
              placeholder="Paste YouTube URL here..."
              autocomplete="off"
              spellcheck="false"
            />
            <button class="fetch-btn" id="fetch-btn" type="button">
              <span class="fetch-btn-text">Fetch</span>
              <svg class="fetch-btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </button>
          </div>
          <p class="input-hint" id="input-hint">Supports youtube.com and youtu.be links</p>
        </div>
      </section>

      <!-- Loading State -->
      <section class="loading-section hidden" id="loading-section">
        <div class="loader-ring">
          <div class="ring"></div>
        </div>
        <p class="loading-text">Fetching video info<span class="loading-dots"></span></p>
      </section>

      <!-- Results Section -->
      <section class="results-section hidden" id="results-section">
        <!-- Video Preview Card -->
        <div class="video-card" id="video-card">
          <div class="video-thumbnail-wrap">
            <img class="video-thumbnail" id="video-thumbnail" src="" alt="Video thumbnail" />
            <span class="video-duration" id="video-duration"></span>
          </div>
          <div class="video-info">
            <h2 class="video-title" id="video-title"></h2>
            <p class="video-channel" id="video-channel"></p>
          </div>
        </div>

        <!-- Format Sections -->
        <div class="formats-container" id="formats-container">
          <!-- Audio Formats -->
          <div class="format-group" id="audio-formats">
            <div class="format-group-header">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
              </svg>
              <h3>Audio</h3>
            </div>
            <div class="format-cards" id="audio-cards"></div>
          </div>

          <!-- Video Formats -->
          <div class="format-group" id="video-formats">
            <div class="format-group-header">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
                <line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/>
                <line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/>
                <line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/>
                <line x1="17" y1="7" x2="22" y2="7"/>
              </svg>
              <h3>Video</h3>
            </div>
            <div class="format-cards" id="video-cards"></div>
          </div>
        </div>

        <button class="back-btn" id="back-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          New Download
        </button>
      </section>

      <!-- Error State -->
      <section class="error-section hidden" id="error-section">
        <div class="error-icon-wrap">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </div>
        <p class="error-text" id="error-text">Something went wrong. Please try again.</p>
        <button class="retry-btn" id="retry-btn" type="button">Try Again</button>
      </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer" id="site-footer">
      <p>&copy; 2026 DownloadYes &mdash; For personal use only.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
